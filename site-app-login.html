    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    background-attachment:fixed;
    color:var(--ink);
    font-family:'Inter',sans-serif;
    font-size:14px;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:2rem;
  }
  .card{
    background:rgba(255,255,255,0.92);
    backdrop-filter:blur(2px);
    border:1px solid var(--rule);
    border-radius:12px;
    padding:2.5rem 2.25rem;
    width:100%;
    max-width:360px;
  }
  .logo-row{display:flex;flex-direction:column;align-items:center;text-align:center;margin-bottom:1.75rem;}
  .logo-row img{width:56px;height:56px;object-fit:contain;margin-bottom:14px;}
  .logo-row h1{font-size:17px;font-weight:500;letter-spacing:-0.01em;}
  .logo-row .sub{font-size:12.5px;color:var(--ink-soft);margin-top:4px;}

  .field{margin-bottom:1.1rem;}
  .field label{
    display:block;
    font-size:11px;
    color:var(--ink-faint);
    text-transform:uppercase;
    letter-spacing:0.06em;
    margin-bottom:6px;
  }
  .field input{
    width:100%;
    padding:10px 12px;
    border:1px solid var(--rule);
    border-radius:6px;
    font-family:'Inter',sans-serif;
    font-size:13.5px;
    color:var(--ink);
    background:var(--bg);
  }
  .field input:focus{outline:none;border-color:var(--ink-soft);}
  .field input::placeholder{color:var(--ink-faint);}

  .row-between{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;font-size:12.5px;}
  .row-between label{display:flex;align-items:center;gap:6px;color:var(--ink-soft);}
  .row-between a{color:var(--ink-soft);text-decoration:none;}
  .row-between a:hover{color:var(--ink);}

  .error-note{
    display:none;
    background:var(--red-soft);
    color:var(--red);
